<div class="player">
  <div class="player__no-files-message">No video files to play</div>
  <div class="player__source-title"></div>

  <span class="player__main-icon j-pause"><span class="icon-container"></span></span>
  <span class="player__main-icon j-play"><span class="icon-container"></span></span>

  <video class="player__video"></video>

  <button
    class="player__source-nav player__source-nav--prev j-source-prev"
    title="Previous source"
  >
    <span class="icon-container"></span>
  </button>
  <button
    class="player__source-nav player__source-nav--next j-source-next"
    title="Next source"
  >
    <span class="icon-container"></span>
  </button>

  <div class="player__top-panel">
    <preview-button></preview-button>
    <playlist-button></playlist-button>
  </div>

  <div class="player__panel">
    <timeline-control class="j-line"></timeline-control>

    <div class="player__panel-block">
      <skip-button class="j-skip-backward" direction="backward" title="Skip backward"></skip-button>
      <open-file-button class="j-open-file"></open-file-button>
      <loop-button class="j-toggle-loop"></loop-button>
      <play-pause-button class="j-toggle-video"></play-pause-button>
      <skip-button class="j-skip-forward" direction="forward" title="Skip forward"></skip-button>
      <volume-control class="j-toggle-volume"></volume-control>
      <time-display class="j-duration"></time-display>
    </div>

    <div class="player__panel-block">
      <speed-options class="j-speed"></speed-options>
      <pip-button class="j-pic-in-pic"></pip-button>
      <fullscreen-button class="j-fullscreen"></fullscreen-button>
    </div>
  </div>

  <playlist-panel></playlist-panel>
  <preview-panel></preview-panel>
</div>
